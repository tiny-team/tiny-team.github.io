{% extends "base.html" %}

{% block content %}
<main>
  <div class="title">
    {{ section.title }}
  </div>
  <ul class="posts">
    {% for page in section.pages %}
    <li>{{ page.date }} &middot; <a href="{{ page.permalink | safe }}">{{ page.title }}</a></li>
    {% endfor %}
  </ul>
</main>
{% endblock content %}
